<!DOCTYPE html>
<html lang="he" dir="rtl"><head><meta charset="UTF-8"><title>Reader</title><script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>body{margin:0;background:#333;color:white}header{height:60px;background:white;color:black;display:flex;align-items:center;padding:0 20px;justify-content:space-between;position:fixed;top:0;width:100%;z-index:10} #v{margin-top:70px;text-align:center} canvas{max-width:100%;box-shadow:0 0 20px black}</style></head>
<body><header><a href="index.html" style="text-decoration:none;color:black;font-weight:bold">🔙 חזרה</a><div id="info">טוען...</div></header><div id="v"><canvas id="c"></canvas></div><script>
const url=new URLSearchParams(window.location.search).get('file');pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
if(url){pdfjsLib.getDocument(url).promise.then(doc=>{doc.getPage(1).then(page=>{const v=page.getViewport({scale:1.5});const can=document.getElementById('c');can.height=v.height;can.width=v.width;page.render({canvasContext:can.getContext('2d'),viewport:v});document.getElementById('info').textContent=`עמוד 1 מתוך ${doc.numPages}`;});});}
</script></body></html>
