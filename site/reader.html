<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>קריאת מסמך | פרימיום</title>
    <style>
        :root { --p: #1a56db; --bg: #1f2937; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--bg); font-family: system-ui, sans-serif; }
        .header { background: #111827; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .controls { display: flex; gap: 10px; align-items: center; }
        .btn { padding: 8px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; text-decoration: none; font-size: 0.9rem; transition: 0.2s; }
        .btn-back { background: #374151; color: white; }
        .btn-dark { background: #facc15; color: #111827; }
        iframe { width: 100%; height: calc(100% - 60px); border: none; transition: filter 0.3s; }
        .dark-mode iframe { filter: invert(0.9) hue-rotate(180deg); background: #fff; }
    </style>
</head>
<body>
    <div class="header">
        <span id="title">טוען...</span>
        <div class="controls">
            <button class="btn btn-dark" onclick="document.body.classList.toggle('dark-mode')">🌙 מצב לילה</button>
            <a href="index.html" class="btn btn-back">חזרה למאגר</a>
        </div>
    </div>
    <iframe id="viewer"></iframe>
    <script>
        const params = new URLSearchParams(window.location.search);
        const file = params.get('file');
        if (file) {
            document.getElementById('viewer').src = file;
            document.getElementById('title').innerText = decodeURIComponent(file.split('/').pop().replace(/_/g, ' '));
        }
    </script>
</body>
</html>
