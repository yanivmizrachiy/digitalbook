<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>קורא ספרים דיגיטלי</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #1e293b; font-family: system-ui, sans-serif; }
        .header { background: #111827; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .title { font-weight: bold; font-size: 1.1rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 50%; }
        .btns { display: flex; gap: 10px; }
        .btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; text-decoration: none; font-size: 0.9rem; }
        .btn-dl { background: #059669; color: white; }
        .btn-back { background: #3b82f6; color: white; }
        iframe { width: 100%; height: calc(100% - 60px); border: none; }
    </style>
</head>
<body>
    <div class="header">
        <div class="title" id="t">טוען ספר...</div>
        <div class="btns">
            <a id="dl" class="btn btn-dl">⬇️ הורד למכשיר</a>
            <a href="index.html" class="btn btn-back">חזרה לספרייה</a>
        </div>
    </div>
    <iframe id="v"></iframe>
    <script>
        const p = new URLSearchParams(window.location.search);
        const f = p.get('file');
        if (f) {
            document.getElementById('v').src = f;
            const name = decodeURIComponent(f.split('/').pop());
            document.getElementById('t').innerText = name;
            document.getElementById('dl').href = f;
            document.getElementById('dl').setAttribute('download', name);
        }
    </script>
</body>
</html>
