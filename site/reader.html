<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Reader | Exam Mode</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #facc15; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--bg); font-family: system-ui, sans-serif; color: white; }
        .header { background: var(--panel); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #334155; }
        .exam-controls { display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.2); padding: 5px 15px; border-radius: 12px; }
        #timer { font-family: monospace; font-size: 1.2rem; color: var(--accent); font-weight: bold; min-width: 80px; text-align: center; }
        .btns { display: flex; gap: 8px; }
        .btn { padding: 8px 14px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 0.85rem; transition: 0.2s; color: white; text-decoration: none; }
        .btn-exam { background: #dc2626; } /* Red for Exam */
        .btn-print { background: #6366f1; }
        .btn-back { background: #475569; }
        iframe { width: 100%; height: calc(100% - 60px); border: none; }
        .focus-mode .header { display: none; }
        .focus-mode iframe { height: 100vh; }
    </style>
</head>
<body>
    <div class="header">
        <div id="t" style="font-weight:bold; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:30%;">טוען...</div>
        
        <div class="exam-controls">
            <span id="timer">00:00</span>
            <button class="btn btn-exam" id="examBtn" onclick="toggleExam()">🚀 התחל מבחן</button>
        </div>

        <div class="btns">
            <button class="btn" style="background:#4ade80; color:#064e3b" onclick="document.body.classList.toggle('focus-mode')">🔳 מיקוד</button>
            <button class="btn btn-print" onclick="window.frames['v'].print()">🖨️ הדפס</button>
            <a href="index.html" class="btn btn-back">חזרה</a>
        </div>
    </div>
    <iframe id="v" name="v"></iframe>

    <script>
        const p = new URLSearchParams(window.location.search);
        const f = p.get('file');
        let timeLeft = 90 * 60; // default 90 min
        let timerInterval;

        if (f) {
            document.getElementById('v').src = f;
            document.getElementById('t').innerText = decodeURIComponent(f.split('/').pop());
        }

        function toggleExam() {
            const btn = document.getElementById('examBtn');
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
                btn.innerText = "🚀 המשך";
                btn.style.background = "#dc2626";
            } else {
                btn.innerText = "⏸️ השהה";
                btn.style.background = "#f59e0b";
                timerInterval = setInterval(updateTimer, 1000);
            }
        }

        function updateTimer() {
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                alert("זמן המבחן הסתיים!");
                return;
            }
            timeLeft--;
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('timer').innerText = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }
    </script>
</body>
</html>
