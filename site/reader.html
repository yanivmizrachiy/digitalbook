<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>קריאת מסמך</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #333; }
        .header { background: #1a56db; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        iframe { width: 100%; height: calc(100% - 60px); border: none; }
        .back-btn { background: white; color: #1a56db; padding: 8px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <span id="title">טוען מסמך...</span>
        <a href="index.html" class="back-btn">חזרה למאגר</a>
    </div>
    <iframe id="viewer"></iframe>
    <script>
        const params = new URLSearchParams(window.location.search);
        const file = params.get('file');
        if (file) {
            document.getElementById('viewer').src = file;
            document.getElementById('title').innerText = decodeURIComponent(file.split('/').pop());
        }
    </script>
</body>
</html>
