<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>קורא דיגיטלי | הדפסה וצפייה</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0f172a; font-family: system-ui, sans-serif; }
        .header { background: #1e293b; color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .btns { display: flex; gap: 8px; }
        .btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; text-decoration: none; font-size: 0.85rem; transition: 0.2s; color: white; }
        .btn-print { background: #6366f1; }
        .btn-dl { background: #059669; }
        .btn-back { background: #3b82f6; }
        iframe { width: 100%; height: calc(100% - 55px); border: none; }
    </style>
</head>
<body>
    <div class="header">
        <div id="t" style="font-weight:bold; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:40%;">טוען...</div>
        <div class="btns">
            <button class="btn btn-print" onclick="window.frames['v'].print()">🖨️ הדפס</button>
            <a id="dl" class="btn btn-dl">⬇️ הורדה</a>
            <a href="index.html" class="btn btn-back">חזרה</a>
        </div>
    </div>
    <iframe id="v" name="v"></iframe>
    <script>
        const p = new URLSearchParams(window.location.search);
        const f = p.get('file');
        if (f) {
            document.getElementById('v').src = f;
            const n = decodeURIComponent(f.split('/').pop());
            document.getElementById('t').innerText = n;
            document.getElementById('dl').href = f;
            document.getElementById('dl').setAttribute('download', n);
        }
    </script>
</body>
</html>
