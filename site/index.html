<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigitalBook | Sovereign v39</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020408; color: #f8fafc; font-family: 'Assistant', sans-serif; transition: 0.5s; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .diff-קל { color: #4ade80; background: rgba(74, 222, 128, 0.1); border: 1px solid rgba(74, 222, 128, 0.3); }
        .diff-בינוני { color: #facc15; background: rgba(250, 204, 21, 0.1); border: 1px solid rgba(250, 204, 21, 0.3); }
        .diff-מאתגר { color: #f87171; background: rgba(248, 113, 113, 0.1); border: 1px solid rgba(248, 113, 113, 0.3); }
        .cinema-mode { background: #ffffff !important; color: #000000 !important; }
        .cinema-mode .glass { border: 1px solid #ddd; background: #f9f9f9; color: #000; }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-6">
            <h1 class="text-5xl font-black italic tracking-tighter">DIGITAL<span class="text-indigo-500">BOOK</span></h1>
            <div class="flex gap-2 flex-wrap justify-center">
                <button onclick="sortData('date')" class="glass px-4 py-2 rounded-xl text-[10px] font-bold hover:bg-indigo-500/20 transition-all">🕒 חדש ביותר</button>
                <button onclick="sortData('pages')" class="glass px-4 py-2 rounded-xl text-[10px] font-bold hover:bg-indigo-500/20 transition-all">📄 הכי הרבה דפים</button>
                <button onclick="toggleCinema()" class="glass p-3 rounded-xl hover:bg-amber-500/20 transition-all">👁️</button>
                <input type="text" id="search" placeholder="חפש חומר..." class="glass p-3 rounded-xl w-48 outline-none text-sm focus:ring-2 focus:ring-indigo-500">
            </div>
        </header>

        <div class="flex gap-4 mb-10 overflow-x-auto pb-2">
            <button onclick="render(allData)" class="glass px-6 py-2 rounded-full text-xs font-bold hover:bg-indigo-500 transition-all">הכל</button>
            <button onclick="filterBySubject('אלגברה')" class="glass px-6 py-2 rounded-full text-xs font-bold hover:bg-indigo-500 transition-all">🔢 אלגברה</button>
            <button onclick="filterBySubject('גיאומטריה')" class="glass px-6 py-2 rounded-full text-xs font-bold hover:bg-indigo-500 transition-all">📐 גיאומטריה</button>
        </div>

        <div id="grid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
    </div>

    <script>
        let allData = [];
        async function load() {
            const r = await fetch('generated/chapters.json?v=' + Date.now());
            const d = await r.json();
            allData = d.items;
            sortData('date'); 
        }

        function render(items) {
            const grid = document.getElementById('grid');
            grid.innerHTML = items.map(i => {
                const isNew = (new Date() - new Date(i.date)) / (1000 * 60 * 60 * 24) < 7;
                const newTag = isNew ? '<span class="bg-indigo-500 text-white text-[8px] px-1.5 py-0.5 rounded mr-1 animate-pulse">NEW</span>' : '';
                return 
                <div class="glass p-6 rounded-2xl cursor-pointer hover:border-indigo-500 transition-all group" onclick="window.location.href='reader.html?file=\'">
                    <div class="text-[10px] font-bold mb-3 opacity-60 flex justify-between items-center">
                        <span>\ | \</span>
                        <span>📄 \</span>
                    </div>
                    <h3 class="text-lg font-bold mb-5 leading-tight group-hover:text-indigo-400 transition-colors">\\</h3>
                    <div class="inline-block text-[10px] font-black px-3 py-1 rounded-lg diff-\">\</div>
                </div>
            }).join('');
        }

        function sortData(key) {
            const sorted = [...allData].sort((a, b) => b[key] - a[key]);
            render(sorted);
        }

        function filterBySubject(s) { render(allData.filter(i => i.subject === s)); }
        
        function toggleCinema() {
            document.body.classList.toggle('cinema-mode');
            const isCinema = document.body.classList.contains('cinema-mode');
            document.getElementById('grid').classList.toggle('md:grid-cols-2', isCinema);
        }

        document.getElementById('search').oninput = (e) => {
            const v = e.target.value.toLowerCase();
            render(allData.filter(i => i.title.toLowerCase().includes(v) || i.subject.toLowerCase().includes(v)));
        };

        load();
    </script>
</body>
</html>
