<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Book | פלטפורמת למידה</title>
    <style>
        :root {
            --primary: #0b5cff; --primary-dark: #0041c2; --bg: #f8fafc;
            --card-bg: #ffffff; --text-main: #1e293b; --text-muted: #64748b;
            --accent: #e0f2fe;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 0; line-height: 1.6; }
        header { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; padding: 40px 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); margin-bottom: 30px; }
        h1 { margin: 0; font-size: 2.5rem; letter-spacing: -1px; }
        .search-container { max-width: 700px; margin: -30px auto 30px; padding: 0 20px; }
        #searchInput { width: 100%; padding: 20px 30px; border-radius: 50px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.05); font-size: 1.1rem; outline: none; transition: 0.3s; }
        #searchInput:focus { box-shadow: 0 10px 25px rgba(11, 92, 255, 0.2); transform: scale(1.02); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; max-width: 1300px; margin: 0 auto; padding: 20px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 25px; cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 1px solid rgba(0,0,0,0.03); position: relative; overflow: hidden; display: flex; flex-direction: column; text-align: right; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.08); border-color: var(--primary); }
        .card::before { content: ""; position: absolute; top: 0; right: 0; width: 6px; height: 100%; background: var(--primary); }
        .tags { display: flex; gap: 10px; margin-bottom: 15px; }
        .tag { padding: 4px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; }
        .tag-pdf { background: #fee2e2; color: #dc2626; }
        .tag-doc { background: #e0e7ff; color: #4338ca; }
        .tag-grade { background: var(--accent); color: var(--primary); }
        .card-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 10px; color: var(--text-main); }
        .card-author { font-size: 0.9rem; color: var(--text-muted); display: flex; align-items: center; gap: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <header><h1>הספר הדיגיטלי</h1><p>מערכת ניהול ידע פדגוגית</p></header>
    <div class="search-container"><input type="text" id="searchInput" placeholder="חפש נושא, כיתה או סוג קובץ..." onkeyup="filter()"></div>
    <div id="toc" class="grid"></div>
    <script>
        async function load() {
            const r = await fetch('generated/chapters.json');
            const data = await r.json();
            document.getElementById('toc').innerHTML = data.map(ch => `
                <div class="card" data-search="${ch.title} ${ch.grade} ${ch.type}" onclick="location.href='${ch.type === 'PDF' ? 'reader.html?file=' + encodeURIComponent(ch.url) : ch.url}'">
                    <div class="tags">
                        <span class="tag tag-${ch.type.toLowerCase()}">${ch.type}</span>
                        <span class="tag tag-grade">${ch.grade}</span>
                    </div>
                    <div class="card-title">${ch.title}</div>
                    <div class="card-author">👤 ${ch.author}</div>
                </div>`).join('');
        }
        function filter() {
            let val = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.card').forEach(c => {
                c.classList.toggle('hidden', !c.getAttribute('data-search').toLowerCase().includes(val));
            });
        }
        load();
    </script>
</body>
</html>
