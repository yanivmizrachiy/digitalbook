<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigitalBook | ארכיון מורים מקצועי</title>
    <style>
        :root { --p: #1e3a8a; --bg: #f1f5f9; --card: #ffffff; --text: #0f172a; --print: #4f46e5; }
        body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; color: var(--text); padding-bottom: 50px; }
        header { background: var(--p); color: white; padding: 30px 20px; text-align: center; border-bottom: 4px solid #facc15; }
        .search-area { max-width: 600px; margin: -25px auto 20px; padding: 0 15px; }
        .search-input { width: 100%; padding: 15px 25px; border-radius: 12px; border: 1px solid #ddd; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-size: 1rem; outline: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; padding: 20px; max-width: 1400px; margin: auto; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; transition: 0.2s; }
        .card:hover { border-color: var(--p); box-shadow: 0 10px 15px rgba(0,0,0,0.05); }
        .info-table { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 0.9rem; }
        .info-table td { padding: 6px 0; border-bottom: 1px solid #f1f5f9; }
        .label { color: #64748b; font-weight: bold; width: 80px; }
        .val { color: var(--text); font-weight: 500; }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: auto; }
        .btn { padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 0.9rem; text-align: center; text-decoration: none; transition: 0.2s; }
        .btn-view { background: #e0e7ff; color: var(--p); }
        .btn-print { background: var(--print); color: white; }
    </style>
</head>
<body>
    <header><h1>מנוע פדגוגי למורים - DigitalBook</h1></header>
    <div class="search-area"><input type="text" id="s" class="search-input" placeholder="🔍 חפש קובץ לפי שם, נושא או מחבר..." oninput="filter()"></div>
    <div id="toc" class="grid"></div>

    <script>
        let items = [];
        async function load() {
            const r = await fetch('generated/chapters.json?v=' + Date.now());
            const d = await r.json(); items = d.items || d.files;
            filter();
        }
        function filter() {
            const q = document.getElementById('s').value.toLowerCase();
            const res = items.filter(i => i.title.toLowerCase().includes(q) || i.subject.toLowerCase().includes(q) || i.author.toLowerCase().includes(q));
            render(res);
        }
        function render(arr) {
            const c = document.getElementById('toc');
            if(!arr.length) { c.innerHTML = '<p>לא נמצאו קבצים העונים לחיפוש.</p>'; return; }
            c.innerHTML = arr.map(i => `
                <div class="card">
                    <h3 style="margin:0; color:var(--p); font-size:1.15rem;">${i.title}</h3>
                    <table class="info-table">
                        <tr><td class="label">כיתה:</td><td class="val">${i.level}</td></tr>
                        <tr><td class="label">נושא:</td><td class="val">${i.subject}</td></tr>
                        <tr><td class="label">סוג:</td><td class="val">${i.type}</td></tr>
                        <tr><td class="label">מחבר:</td><td class="val">${i.author}</td></tr>
                        <tr><td class="label">שנה:</td><td class="val">${i.year}</td></tr>
                    </table>
                    <div class="actions">
                        <a href="reader.html?file=${encodeURIComponent(i.url)}" class="btn btn-view">📄 פתח לעיון</a>
                        <button class="btn btn-print" onclick="window.open('reader.html?file=${encodeURIComponent(i.url)}&print=true')">🖨️ הדפס קובץ</button>
                    </div>
                </div>`).join('');
        }
        load();
    </script>
</body>
</html>
