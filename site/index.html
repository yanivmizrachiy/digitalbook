<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mathematics Digital Library</title>
    <style>
        :root { --p: #1a56db; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --download: #059669; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; color: var(--text); line-height: 1.5; }
        header { background: linear-gradient(135deg, #1a56db, #1e40af); color: white; padding: 50px 20px; text-align: center; border-radius: 0 0 40px 40px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .nav-container { max-width: 800px; margin: -30px auto 30px; padding: 0 15px; }
        .tabs { display: flex; gap: 10px; background: white; padding: 8px; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow-x: auto; scrollbar-width: none; }
        .tab { padding: 10px 25px; border-radius: 40px; cursor: pointer; font-weight: bold; color: var(--p); white-space: nowrap; transition: 0.3s; }
        .tab.active { background: var(--p); color: white; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; padding: 20px; max-width: 1400px; margin: auto; }
        .card { background: var(--card); border-radius: 25px; padding: 25px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.02); transition: 0.3s; position: relative; overflow: hidden; }
        .card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); border-color: var(--p); }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 10px; font-size: 0.75rem; font-weight: 800; margin-bottom: 12px; background: #eff6ff; color: var(--p); }
        h3 { margin: 10px 0; font-size: 1.25rem; color: #0f172a; cursor: pointer; }
        .meta { font-size: 0.85rem; color: #64748b; margin-bottom: 20px; }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 12px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; text-decoration: none; }
        .btn-view { background: var(--p); color: white; }
        .btn-download { background: var(--download); color: white; }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <header>
        <h1>הספר הדיגיטלי למתמטיקה</h1>
        <p id="stats">טוען נתונים...</p>
    </header>
    <div class="nav-container">
        <div class="tabs">
            <div class="tab active" onclick="filter('all', this)">הכל</div>
            <div class="tab" onclick="filter('Grade 7', this)">כיתה ז'</div>
            <div class="tab" onclick="filter('Grade 8', this)">כיתה ח'</div>
            <div class="tab" onclick="filter('Grade 9', this)">כיתה ט'</div>
            <div class="tab" onclick="filter('Units', this)">בגרות</div>
        </div>
    </div>
    <div id="toc" class="grid"></div>
    <script>
        let allItems = [];
        async function load() {
            const r = await fetch('generated/chapters.json?v=' + Date.now());
            const d = await r.json(); allItems = d.items || d.files;
            document.getElementById('stats').innerText = `📊 סה"כ ${allItems.length} ספרים וקבצים זמינים`;
            render(allItems);
        }
        function filter(lvl, btn) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            render(lvl === 'all' ? allItems : allItems.filter(i => i.level.includes(lvl)));
        }
        async function downloadFile(url, filename) {
            const response = await fetch(url);
            const blob = await response.blob();
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(blob);
            link.download = filename;
            link.click();
        }
        function render(arr) {
            document.getElementById('toc').innerHTML = arr.map(i => `
                <div class="card">
                    <div class="badge">${i.level} | ${i.subject}</div>
                    <h3 onclick="location.href='reader.html?file=${encodeURIComponent(i.url)}'">${i.title}</h3>
                    <div class="meta">👤 ${i.author} | 📅 ${i.year}</div>
                    <div class="actions">
                        <button class="btn btn-view" onclick="location.href='reader.html?file=${encodeURIComponent(i.url)}'">👁️ צפייה</button>
                        <button class="btn btn-download" onclick="downloadFile('${i.url}', '${i.title}.${i.ext.toLowerCase()}')">⬇️ הורדה</button>
                    </div>
                </div>
            `).join('');
        }
        load();
    </script>
</body>
</html>
