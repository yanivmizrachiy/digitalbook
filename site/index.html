<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigitalBook | Sovereign Cyberpunk v41</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        body { background: #020408; color: #f8fafc; font-family: 'Assistant', sans-serif; transition: 0.5s; overflow-x: hidden; }
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: -1; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .neon-glow:hover { box-shadow: 0 0 25px rgba(99, 102, 241, 0.4); border-color: #6366f1; }
        .diff-קל { color: #4ade80; background: rgba(74, 222, 128, 0.1); border: 1px solid rgba(74, 222, 128, 0.3); }
        .diff-בינוני { color: #facc15; background: rgba(250, 204, 21, 0.1); border: 1px solid rgba(250, 204, 21, 0.3); }
        .diff-מאתגר { color: #f87171; background: rgba(248, 113, 113, 0.1); border: 1px solid rgba(248, 113, 113, 0.3); }
        .cinema-mode { background: #ffffff !important; color: #000000 !important; }
        .cinema-mode .glass { border: 1px solid #ddd; background: #f9f9f9; color: #000; }
        .stealth-mode .difficulty-badge, .stealth-mode .page-count { display: none !important; }
        .text-glow { text-shadow: 0 0 10px rgba(99, 102, 241, 0.8); }
    </style>
</head>
<body class="p-6 md:p-12">
    <div id="particles-js"></div>
    <div class="max-w-7xl mx-auto relative">
        <header class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
            <h1 class="text-6xl font-black italic tracking-tighter cursor-pointer" onclick="location.reload()">DIGITAL<span class="text-indigo-500 text-glow">BOOK</span></h1>
            <div class="flex gap-2 flex-wrap justify-center glass p-2 rounded-2xl">
                <button onclick="toggleStealth()" class="p-3 rounded-xl hover:bg-indigo-500/20 transition-all" title="מצב סטודנט (הסתרת נתונים)">🕶️</button>
                <button onclick="toggleCinema()" class="p-3 rounded-xl hover:bg-amber-500/20 transition-all" title="מצב הקרנה">👁️</button>
                <button onclick="sortData('date')" class="px-5 py-2 rounded-xl text-[10px] font-bold hover:bg-indigo-500/20">🕒 חדש</button>
                <button onclick="startVoice()" class="p-3 rounded-xl hover:bg-indigo-500/20">🎤</button>
                <input type="text" id="search" placeholder="חפש חומר..." class="bg-white/5 p-3 rounded-xl w-48 outline-none text-sm focus:ring-2 focus:ring-indigo-500">
            </div>
        </header>

        <div class="flex gap-3 mb-12 overflow-x-auto pb-2 no-scrollbar glass p-2 rounded-full max-w-2xl mx-auto">
            <button onclick="render(allData)" class="px-6 py-2 rounded-full text-xs font-bold hover:bg-indigo-500 transition-all">הכל</button>
            <button onclick="filterByGrade('כיתה ז')" class="px-6 py-2 rounded-full text-xs font-bold border border-emerald-500/30 text-emerald-400">ז'</button>
            <button onclick="filterByGrade('כיתה ח')" class="px-6 py-2 rounded-full text-xs font-bold border border-emerald-500/30 text-emerald-400">ח'</button>
            <button onclick="filterByGrade('כיתה ט')" class="px-6 py-2 rounded-full text-xs font-bold border border-emerald-500/30 text-emerald-400">ט'</button>
            <button onclick="filterBySubject('אלגברה')" class="px-6 py-2 rounded-full text-xs font-bold border border-indigo-500/30 text-indigo-400">🔢 אלגברה</button>
            <button onclick="filterBySubject('גיאומטריה')" class="px-6 py-2 rounded-full text-xs font-bold border border-indigo-500/30 text-indigo-400">📐 גיאומטריה</button>
        </div>

        <div id="grid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8"></div>
    </div>

    <script>
        // האפקט של הרקע הדינמי
        particlesJS('particles-js', {
            "particles": { "number": { "value": 40 }, "color": { "value": "#6366f1" }, "opacity": { "value": 0.2 }, "shape": { "type": "circle" }, "size": { "value": 2 }, "move": { "enable": true, "speed": 1 } }
        });

        let allData = [];
        async function load() {
            const r = await fetch('generated/chapters.json?v=' + Date.now());
            const d = await r.json();
            allData = d.items;
            sortData('date'); 
        }

        function render(items) {
            const grid = document.getElementById('grid');
            grid.innerHTML = items.map(i => {
                const isNew = (new Date() - new Date(i.date)) / (1000 * 60 * 60 * 24) < 7;
                const newTag = isNew ? '<span class="bg-indigo-500 text-white text-[8px] px-1.5 py-0.5 rounded mr-1 animate-pulse">NEW</span>' : '';
                return 
                <div class="glass p-8 rounded-3xl cursor-pointer neon-glow transition-all group" onclick="window.location.href='reader.html?file=\'">
                    <div class="text-[11px] font-bold mb-4 flex justify-between items-center opacity-70 tracking-widest">
                        <span>\ | \</span>
                        <span class="page-count">📄 \</span>
                    </div>
                    <h3 class="text-xl font-bold mb-6 leading-tight group-hover:text-indigo-400 transition-colors">\\</h3>
                    <div class="difficulty-badge inline-block text-[10px] font-black px-4 py-1.5 rounded-full diff-\">\</div>
                </div>
            }).join('');
        }

        function sortData(key) {
            const sorted = [...allData].sort((a, b) => b[key] - a[key]);
            render(sorted);
        }

        function filterBySubject(s) { render(allData.filter(i => i.subject === s)); }
        function filterByGrade(g) { render(allData.filter(i => i.level.includes(g))); }
        
        function toggleCinema() {
            document.body.classList.toggle('cinema-mode');
            const isCinema = document.body.classList.contains('cinema-mode');
            document.getElementById('grid').classList.toggle('md:grid-cols-2', isCinema);
        }

        function toggleStealth() { document.body.classList.toggle('stealth-mode'); }

        document.getElementById('search').oninput = (e) => {
            const v = e.target.value.toLowerCase();
            render(allData.filter(i => i.title.toLowerCase().includes(v) || i.subject.toLowerCase().includes(v)));
        };
        
        function startVoice() {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'he-IL';
            rec.onresult = (e) => { 
                const t = e.results[0][0].transcript;
                document.getElementById('search').value = t;
                render(allData.filter(i => i.title.includes(t)));
            };
            rec.start();
        }

        load();
    </script>
</body>
</html>
