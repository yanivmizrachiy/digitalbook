<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigitalBook | ארכיון מתמטיקה מקצועי</title>
    <style>
        :root { --p: #1e3a8a; --bg: #f8fafc; --card: #ffffff; }
        body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        header { background: var(--p); color: white; padding: 25px; text-align: center; border-bottom: 4px solid #facc15; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; padding: 20px; max-width: 1400px; margin: auto; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .meta-table { width: 100%; margin: 15px 0; font-size: 0.85rem; border-collapse: collapse; }
        .meta-table td { padding: 5px 0; border-bottom: 1px solid #f1f5f9; }
        .label { color: #64748b; font-weight: bold; width: 100px; }
        .val { color: #0f172a; }
        .unknown { color: #ef4444; font-weight: bold; font-style: italic; }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: auto; }
        .btn { padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none; font-size: 0.85rem; }
        .btn-view { background: #e0e7ff; color: var(--p); }
        .btn-dl { background: #059669; color: white; }
    </style>
</head>
<body>
    <header><h1>הספר הדיגיטלי - ניהול חומרי לימוד</h1></header>
    <div id="toc" class="grid"></div>
    <script>
        async function dl(url, name) {
            const r = await fetch(url); const b = await r.blob();
            const l = document.createElement('a'); l.href = URL.createObjectURL(b); l.download = name; l.click();
        }
        async function load() {
            const r = await fetch('generated/chapters.json?v=' + Date.now());
            const d = await r.json();
            document.getElementById('toc').innerHTML = d.items.map(i => `
                <div class="card">
                    <h3 style="margin:0; color:var(--p);">${i.title}</h3>
                    <table class="meta-table">
                        <tr><td class="label">מחבר:</td><td class="val ${i.author === 'Unknown' ? 'unknown' : ''}">${i.author === 'Unknown' ? 'Unknown' : i.author}</td></tr>
                        <tr><td class="label">סיווג כיתה:</td><td class="val">${i.level}</td></tr>
                        <tr><td class="label">נושא:</td><td class="val">${i.subject}</td></tr>
                        <tr><td class="label">סוג מטלה:</td><td class="val">${i.type}</td></tr>
                    </table>
                    <div class="actions">
                        <a href="reader.html?file=${encodeURIComponent(i.url)}" class="btn btn-view">👁️ צפייה</a>
                        <button class="btn btn-dl" onclick="dl('${i.url}', '${i.title}.${i.ext}')">⬇️ הורדה</button>
                    </div>
                </div>`).join('');
        }
        load();
    </script>
</body>
</html>
