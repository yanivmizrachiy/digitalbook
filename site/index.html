<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigitalBook | Sovereign v45</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        body { background: #020408; color: #f8fafc; font-family: 'Assistant', sans-serif; transition: 0.5s; overflow-x: hidden; }
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: -1; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .neon-glow:hover { box-shadow: 0 0 25px rgba(99, 102, 241, 0.4); border-color: #6366f1; }
        .selected-card { border: 2px solid #6366f1 !important; box-shadow: 0 0 30px rgba(99, 102, 241, 0.6); transform: scale(0.98); }
        .diff-קל { color: #4ade80; background: rgba(74, 222, 128, 0.1); border: 1px solid rgba(74, 222, 128, 0.3); }
        .diff-בינוני { color: #facc15; background: rgba(250, 204, 21, 0.1); border: 1px solid rgba(250, 204, 21, 0.3); }
        .diff-מאתגר { color: #f87171; background: rgba(248, 113, 113, 0.1); border: 1px solid rgba(248, 113, 113, 0.3); }
        .stealth-mode .difficulty-badge, .stealth-mode .page-count { display: none !important; }
    </style>
</head>
<body class="p-6 md:p-12">
    <div id="particles-js"></div>
    <div class="max-w-7xl mx-auto relative">
        <header class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
            <h1 class="text-6xl font-black italic tracking-tighter cursor-pointer" onclick="location.reload()">DIGITAL<span class="text-indigo-500">BOOK</span></h1>
            <div class="flex gap-2 flex-wrap justify-center glass p-2 rounded-2xl">
                <button id="compare-btn" onclick="toggleCompareMode()" class="p-3 rounded-xl hover:bg-indigo-500/20" title="השוואת קבצים (Shift+Click)">⚖️</button>
                <button onclick="toggleStealth()" class="p-3 rounded-xl hover:bg-indigo-500/20" title="מצב סטודנט">🕶️</button>
                <button onclick="sortData('date')" class="px-5 py-2 rounded-xl text-[10px] font-bold">🕒 חדש</button>
                <input type="text" id="search" placeholder="חפש חומר..." class="bg-white/5 p-3 rounded-xl w-48 outline-none text-sm focus:ring-2 focus:ring-indigo-500">
            </div>
        </header>

        <div id="grid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8"></div>
    </div>

    <script>
        particlesJS('particles-js', { "particles": { "number": { "value": 40 }, "color": { "value": "#6366f1" }, "opacity": { "value": 0.2 }, "move": { "enable": true, "speed": 1 } } });
        
        let allData = [];
        let selectedForCompare = [];

        async function load() {
            const r = await fetch('generated/chapters.json?v=' + Date.now());
            const d = await r.json();
            allData = d.items;
            render(allData);
        }

        function handleCardClick(url, event) {
            if (event.shiftKey) {
                event.preventDefault();
                if (selectedForCompare.includes(url)) {
                    selectedForCompare = selectedForCompare.filter(u => u !== url);
                } else if (selectedForCompare.length < 2) {
                    selectedForCompare.push(url);
                }
                render(allData);
            } else {
                window.location.href = 'reader.html?file=' + url;
            }
        }

        function toggleCompareMode() {
            if (selectedForCompare.length === 2) {
                window.location.href = compare.html?file1=\&file2=\;
            } else {
                alert('בחר 2 קבצים באמצעות Shift + לחיצה');
            }
        }

        function render(items) {
            const grid = document.getElementById('grid');
            grid.innerHTML = items.map(i => {
                const isSelected = selectedForCompare.includes(i.url);
                return 
                <div class="glass p-8 rounded-3xl cursor-pointer neon-glow transition-all group \" 
                     onclick="handleCardClick('\', event)">
                    <div class="text-[11px] font-bold mb-4 flex justify-between items-center opacity-70">
                        <span>\ | \</span>
                        <span class="page-count">📄 \</span>
                    </div>
                    <h3 class="text-xl font-bold mb-6">\</h3>
                    <div class="difficulty-badge inline-block text-[10px] font-black px-4 py-1.5 rounded-full diff-\">\</div>
                </div>
            }).join('');
        }

        function toggleStealth() { document.body.classList.toggle('stealth-mode'); }
        document.getElementById('search').oninput = (e) => {
            const v = e.target.value.toLowerCase();
            render(allData.filter(i => i.title.toLowerCase().includes(v)));
        };

        load();
    </script>
</body>
</html>
