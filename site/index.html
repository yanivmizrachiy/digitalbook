<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigitalBook | Sovereign v36</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020408; color: #f8fafc; font-family: 'Assistant', sans-serif; transition: 0.5s; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .cinema-mode { background: #ffffff !important; color: #000000 !important; }
        .cinema-mode .glass { border: 1px solid #ddd; background: #f9f9f9; color: #000; }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-7xl mx-auto">
        <div class="flex gap-4 mb-6 text-[10px] font-mono uppercase tracking-widest opacity-60">
            <span>סה"כ נכסים: 15</span> | <span>🔢 אלגברה: 0</span> | <span>📐 גיאומטריה: 2</span> | <span>🎉 חברה: 13</span>
        </div>

        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-6">
            <h1 class="text-5xl font-black italic tracking-tighter">DIGITAL<span class="text-indigo-500">BOOK</span></h1>
            <div class="flex gap-2">
                <input type="text" id="search" placeholder="חפש..." class="glass p-3 rounded-xl w-64 outline-none">
                <button onclick="toggleCinema()" class="glass p-3 rounded-xl hover:bg-amber-500/20" title="מצב כיתה">👁️</button>
                <button onclick="startVoice()" class="glass p-3 rounded-xl hover:bg-indigo-500/20">🎤</button>
            </div>
        </header>

        <div class="flex gap-4 mb-10 overflow-x-auto pb-2">
            <button onclick="render(allData)" class="glass px-5 py-1.5 rounded-full text-xs font-bold">הכל</button>
            <button onclick="filterBySubject('אלגברה')" class="glass px-5 py-1.5 rounded-full text-xs font-bold">אלגברה</button>
            <button onclick="filterBySubject('גיאומטריה')" class="glass px-5 py-1.5 rounded-full text-xs font-bold">גיאומטריה</button>
        </div>

        <div id="grid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
    </div>

    <script>
        let allData = [];
        async function load() {
            const r = await fetch('generated/chapters.json?v=' + Date.now());
            const d = await r.json();
            allData = d.items;
            render(allData);
        }

        function render(items) {
            const grid = document.getElementById('grid');
            grid.innerHTML = items.map(i => 
                <div class="glass p-6 rounded-2xl cursor-pointer hover:border-indigo-500 transition-all" onclick="window.location.href='reader.html?file=\'">
                    <div class="text-indigo-400 text-[10px] font-bold mb-2">\ | \</div>
                    <h3 class="text-lg font-bold mb-4">\</h3>
                    <div class="text-slate-500 text-[10px]">\</div>
                </div>
            ).join('');
        }

        function filterBySubject(s) { render(allData.filter(i => i.subject === s)); }
        
        function toggleCinema() {
            document.body.classList.toggle('cinema-mode');
            const isCinema = document.body.classList.contains('cinema-mode');
            document.getElementById('grid').classList.toggle('md:grid-cols-2', isCinema);
        }

        function startVoice() {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'he-IL';
            rec.onresult = (e) => { 
                const t = e.results[0][0].transcript;
                document.getElementById('search').value = t;
                render(allData.filter(i => i.title.includes(t) || i.subject.includes(t)));
            };
            rec.start();
        }

        document.getElementById('search').oninput = (e) => {
            const v = e.target.value.toLowerCase();
            render(allData.filter(i => i.title.toLowerCase().includes(v)));
        };

        load();
    </script>
</body>
</html>
