<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Sovereign Dual-View</title>
    <style>
        body { margin: 0; background: #020408; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        .toolbar { height: 60px; background: rgba(30, 41, 59, 0.9); display: flex; align-items: center; padding: 0 20px; gap: 15px; border-bottom: 1px solid #334155; }
        .view-container { display: flex; flex: 1; gap: 2px; background: #334155; }
        iframe { flex: 1; border: none; background: white; }
        .nav-button { background: #6366f1; border: none; color: white; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="toolbar">
        <button class="nav-button" onclick="location.href='index.html'">🔙 חזרה למאגר</button>
        <div style="margin-right: auto; opacity: 0.7;">מצב השוואה פדגוגי</div>
    </div>
    <div class="view-container">
        <iframe id="left-view"></iframe>
        <iframe id="right-view"></iframe>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        document.getElementById('left-view').src = 'reader.html?file=' + params.get('file1');
        document.getElementById('right-view').src = 'reader.html?file=' + params.get('file2');
    </script>
</body>
</html>
