<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>השוואת קבצים — DigitalBook</title>
  <style>
    :root{
      --bg:#0b1220;
      --card:rgba(255,255,255,.06);
      --card2:rgba(255,255,255,.09);
      --txt:#eef4ff;
      --muted:#b8c3d8;
      --brand:#0b5cff;
      --border:rgba(255,255,255,.12);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;
      background:linear-gradient(180deg,#0b1220,#101a2f);
      color:var(--txt);
    }
    .top{
      position:sticky;top:0;z-index:20;
      background:rgba(8,14,26,.88);
      backdrop-filter:blur(10px);
      border-bottom:1px solid var(--border);
      padding:14px;
    }
    .title{font-size:1.2rem;font-weight:900;margin-bottom:10px}
    .controls{
      display:grid;
      grid-template-columns:1fr 1fr auto auto auto;
      gap:10px;
      align-items:center;
    }
    .input,.btn{
      min-height:44px;
      border-radius:12px;
      border:1px solid var(--border);
      background:var(--card2);
      color:var(--txt);
      padding:10px 12px;
    }
    .btn{
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-weight:700;
    }
    .btn.primary{background:var(--brand);border-color:transparent}
    .hint{color:var(--muted);font-size:.9rem;margin-top:8px}
    .layout{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      padding:12px;
      min-height:calc(100vh - 120px);
    }
    .pane{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      overflow:hidden;
      min-height:75vh;
      display:flex;
      flex-direction:column;
    }
    .paneHead{
      padding:10px 12px;
      border-bottom:1px solid var(--border);
      display:flex;
      justify-content:space-between;
      gap:8px;
      align-items:center;
      background:rgba(255,255,255,.04);
    }
    .paneTitle{
      font-weight:800;
      font-size:.96rem;
      line-height:1.3;
    }
    .paneActions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .miniBtn{
      border:none;
      background:rgba(255,255,255,.12);
      color:var(--txt);
      border-radius:10px;
      padding:8px 10px;
      cursor:pointer;
      text-decoration:none;
      font-size:.86rem;
    }
    iframe{
      width:100%;
      flex:1;
      border:none;
      background:white;
    }
    .empty{
      padding:26px;
      color:var(--muted);
      text-align:center;
    }
    @media (max-width:980px){
      .controls{grid-template-columns:1fr}
      .layout{grid-template-columns:1fr}
    }
  </style>
</head>
<body>

<div id="compareTopBar" class="compare-top-bar">
  <div class="compare-actions-secondary">
  <a class="reader-action-btn qa-back-btn" href="qa.html" target="_blank" rel="noopener">🧪 QA</a>
  <h2 class="compare-title">השוואת קבצים</h2>
  <div class="compare-actions">
    <a id="downloadFile1" class="reader-action-btn" href="#" target="_blank" rel="noopener">⬇ הורדת קובץ 1</a>
    <a id="downloadFile2" class="reader-action-btn" href="#" target="_blank" rel="noopener">⬇ הורדת קובץ 2</a>
    <button id="compareBackBtn" class="reader-action-btn" type="button">⬅ חזרה לקטלוג</button>
  </div>
  </div>
</div>


  <div class="top">
    <div class="title">⚖️ Compare V2 — השוואת שני קבצים</div>
    <div class="controls">
      <select id="leftSelect" class="input"></select>
      <select id="rightSelect" class="input"></select>
      <button id="swapBtn" class="btn">החלף</button>
      <a class="btn" href="index.html">חזרה לבית</a>
      <button id="applyBtn" class="btn primary">הצג</button>
    </div>
    <div class="hint">בחר שני קבצי PDF אמיתיים מתוך המאגר והשווה ביניהם זה לצד זה.</div>
  </div>

  <div class="layout">
    <section class="pane">
      <div class="paneHead">
        <div class="paneTitle" id="leftTitle">צד שמאל</div>
        <div class="paneActions">
          <a id="leftOpen" class="miniBtn" href="#">פתח</a>
          <a id="leftDownload" class="miniBtn" href="#" download>הורד</a>
        </div>
      </div>
      <iframe id="leftFrame" title="Left PDF"></iframe>
    </section>

    <section class="pane">
      <div class="paneHead">
        <div class="paneTitle" id="rightTitle">צד ימין</div>
        <div class="paneActions">
          <a id="rightOpen" class="miniBtn" href="#">פתח</a>
          <a id="rightDownload" class="miniBtn" href="#" download>הורד</a>
        </div>
      </div>
      <iframe id="rightFrame" title="Right PDF"></iframe>
    </section>
  </div>

  <script>
    const $ = s => document.querySelector(s);

    function text(v){ return String(v ?? ""); }

    function flatten(data){
      const out = [];
      const seen = new Set();

      function guessTitle(url){
        return text(url).split("/").pop().replace(/\.pdf$/i,"").replaceAll("_"," ");
      }

      function walk(x){
        if (Array.isArray(x)) return x.forEach(walk);
        if (!x || typeof x !== "object") return;

        if (typeof x.url === "string"){
          const url = x.url.replace(/\\/g,"/");
          if (!seen.has(url)){
            seen.add(url);
            out.push({
              title: text(x.title || guessTitle(url)),
              url
            });
          }
        }
        Object.values(x).forEach(walk);
      }

      walk(data);
      return out;
    }

    async function loadItems(){
      const r = await fetch("generated/chapters.json?_=" + Date.now(), {cache:"no-store"});
      const data = await r.json();
      return flatten(data);
    }

    function fillSelect(sel, items, chosen){
      sel.innerHTML = items.map(it =>
        `<option value="${it.url}" ${it.url===chosen ? "selected" : ""}>${it.title}</option>`
      ).join("");
    }

    function params(){
      const p = new URLSearchParams(location.search);
      return { left: p.get("left") || "", right: p.get("right") || "" };
    }

    function setLinks(side, item){
      if (!item) return;
      $(`#${side}Title`).textContent = item.title;
      $(`#${side}Open`).href = `reader.html?file=${encodeURIComponent(item.url)}`;
      $(`#${side}Download`).href = item.url;
      $(`#${side}Frame`).src = `reader.html?file=${encodeURIComponent(item.url)}`;
    }

    function applyState(items){
      const left = $("#leftSelect").value;
      const right = $("#rightSelect").value;
      const u = new URL(location.href);
      u.searchParams.set("left", left);
      u.searchParams.set("right", right);
      history.replaceState({}, "", u);

      const leftItem = items.find(x => x.url === left);
      const rightItem = items.find(x => x.url === right);
      setLinks("left", leftItem);
      setLinks("right", rightItem);
    }

    (async function(){
      const items = await loadItems();
      const p = params();

      const leftDefault = p.left || items[0]?.url || "";
      const rightDefault = p.right || items[1]?.url || items[0]?.url || "";

      fillSelect($("#leftSelect"), items, leftDefault);
      fillSelect($("#rightSelect"), items, rightDefault);

      $("#applyBtn").addEventListener("click", () => applyState(items));
      $("#swapBtn").addEventListener("click", () => {
        const a = $("#leftSelect").value;
        $("#leftSelect").value = $("#rightSelect").value;
        $("#rightSelect").value = a;
        applyState(items);
      });

      applyState(items);
    })().catch(err => {
      console.error(err);
      document.body.insertAdjacentHTML("beforeend", `<div class="empty">שגיאה בטעינת compare: ${String(err)}</div>`);
    });
  </script>

<script>
(function(){
  const params = new URLSearchParams(window.location.search);
  const f1 = params.get('file1') || '';
  const f2 = params.get('file2') || '';
  const d1 = document.getElementById('downloadFile1');
  const d2 = document.getElementById('downloadFile2');
  const backBtn = document.getElementById('compareBackBtn');

  if (d1 && f1) {
    d1.href = f1;
    const parts = f1.split('/');
    d1.setAttribute('download', parts[parts.length - 1] || 'file1.pdf');
  }
  if (d2 && f2) {
    d2.href = f2;
    const parts = f2.split('/');
    d2.setAttribute('download', parts[parts.length - 1] || 'file2.pdf');
  }
  if (backBtn) backBtn.addEventListener('click', () => history.back());
})();
</script>

</body>
</html>
